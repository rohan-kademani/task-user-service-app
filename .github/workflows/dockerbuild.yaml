name: Build, Scan and Push Docker Image

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/user-service:${{ github.run_number }} \
            -t ${{ secrets.DOCKER_USERNAME }}/user-service:latest \
            .

      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/user-service:${{ github.run_number }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/user-service:${{ github.run_number }}
          docker push ${{ secrets.DOCKER_USERNAME }}/user-service:latest